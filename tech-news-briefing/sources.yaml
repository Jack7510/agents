search_queries:
  blog_first:
    - 'site:openai.com/news/ AI OR model OR product OR research'
    - 'site:anthropic.com/news Claude OR model OR safety OR research'
    - 'site:deepmind.google/discover/blog/ Gemini OR model OR research'
    - 'site:research.google/blog/ AI OR machine learning OR education'
    - 'site:ai.meta.com/blog/ Llama OR AI OR research OR open source'
    - 'site:blogs.microsoft.com/ai/ Copilot OR Azure AI OR model'
    - 'site:developer.nvidia.com/blog/ AI OR inference OR CUDA OR GPU'
    - 'site:blogs.nvidia.com/ AI OR data center OR GPU'
    - 'site:huggingface.co/blog model OR dataset OR benchmark OR agent'
    - 'site:karpathy.ai LLM OR agent OR AI education'
    - 'site:simonwillison.net LLM OR agents OR AI'
    - 'site:deeplearning.ai/the-batch AI OR agents OR education'
    - 'site:lilianweng.github.io agents OR LLM OR alignment'
    - 'site:huyenchip.com/blog AI engineering OR agents OR evaluation'
    - 'site:eugeneyan.com/writing LLM OR evaluation OR recommender'

  daily_general:
    - '"AI model" OR "new model" launch today'
    - '"AI chip" OR accelerator OR GPU announced today'
    - '"data center" AI power demand energy today'
    - '"AI education" product launch today'
    - '"open source" AI agent GitHub release today'

  company_specific:
    - 'OpenAI OR Anthropic OR Google DeepMind OR Meta AI new model product'
    - 'NVIDIA OR AMD OR Intel OR TSMC OR ASML AI chip data center'
    - 'Tesla OR BYD OR CATL battery energy storage AI data center'
    - 'Khan Academy OR Duolingo OR Coursera AI education product'

  chinese:
    - 'AI 大模型 新产品 发布 今天'
    - '芯片 AI 加速器 数据中心 发布 今天'
    - '新能源 电池 储能 AI 数据中心 今天'
    - 'AI 教育 产品 发布 今天'

selection_keywords:
  strong_positive:
    - launched
    - announced
    - released
    - open sourced
    - generally available
    - benchmark
    - production
    - partnership
    - acquisition
    - funding
    - regulation
    - model card
    - technical report
    - 发布
    - 推出
    - 开源
    - 上线
    - 量产
    - 商用
    - 融资
    - 合作

  weak_or_skip:
    - rumor
    - teaser
    - sponsored
    - generic thought leadership
    - minor UI update
    - 未证实
    - 传闻
    - 软文
    - 营销稿
